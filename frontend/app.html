<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADLYTICS v5.0 - AI Ad Pre-Validation</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #111827;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-700: #374151;
            --gray-900: #111827;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--gray-900);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-left: 10px;
        }

        /* Form Styles */
        .analyzer-form {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--gray-700);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results Container */
        .results {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .tabs-nav {
            display: flex;
            background: var(--gray-100);
            border-bottom: 1px solid var(--gray-200);
            overflow-x: auto;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 16px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: var(--gray-700);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            background: var(--gray-200);
            color: var(--gray-900);
        }

        .tab-btn.active {
            background: white;
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .tab-content {
            display: none;
            padding: 30px;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scores Grid */
        .scores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .score-card {
            background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border-left: 4px solid var(--gray-200);
        }

        .score-card.excellent { border-left-color: var(--success); }
        .score-card.good { border-left-color: #3b82f6; }
        .score-card.average { border-left-color: var(--warning); }
        .score-card.poor { border-left-color: #f97316; }
        .score-card.critical { border-left-color: var(--danger); }

        .score-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 5px;
        }

        .score-label {
            font-size: 0.9rem;
            color: var(--gray-700);
            font-weight: 500;
        }

        .score-bar {
            height: 6px;
            background: var(--gray-200);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.5s ease;
        }

        /* Cards */
        .card {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card h3 {
            margin-bottom: 15px;
            color: var(--gray-900);
        }

        /* Decision Engine */
        .decision-card {
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .decision-card.success {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border: 2px solid var(--success);
        }

        .decision-card.danger {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border: 2px solid var(--danger);
        }

        .decision-card h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .decision-confidence {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .decision-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .metric {
            background: rgba(255,255,255,0.5);
            padding: 15px;
            border-radius: 8px;
        }

        .metric label {
            display: block;
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .metric value {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .decision-thresholds {
            text-align: left;
            margin-top: 20px;
        }

        .threshold {
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
        }

        .threshold.kill {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid var(--danger);
        }

        .threshold.go {
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--success);
        }

        /* Budget Grid */
        .budget-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .budget-card {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #bfdbfe;
        }

        .budget-card h4 {
            font-size: 0.9rem;
            color: var(--gray-700);
            margin-bottom: 10px;
        }

        .budget-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .scaling-rule {
            background: #f0fdf4;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--success);
        }

        /* Neuro Response */
        .neuro-container {
            background: #faf5ff;
            padding: 25px;
            border-radius: 12px;
        }

        .neuro-primary {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            background: white;
            border-radius: 8px;
        }

        .neuro-bars {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .neuro-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
        }

        .neuro-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .neuro-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .neuro-bar {
            height: 20px;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .neuro-value {
            min-width: 30px;
            font-weight: 600;
        }

        /* Fatigue */
        .fatigue-card {
            padding: 25px;
            border-radius: 12px;
        }

        .fatigue-card.low {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
        }

        .fatigue-card.medium {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
        }

        .fatigue-card.high {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
        }

        .fatigue-card.ultra-high {
            background: linear-gradient(135deg, #fecaca 0%, #fca5a5 100%);
        }

        .fatigue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .refresh-badge {
            background: var(--danger);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Objections */
        .objections-container {
            display: grid;
            gap: 20px;
        }

        .objection-section {
            background: #fef2f2;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--danger);
        }

        .objection-section h4 {
            margin-bottom: 15px;
        }

        .objection-section ul {
            list-style: none;
            padding: 0;
        }

        .objection-section li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(239, 68, 68, 0.1);
        }

        .objection-section li:last-child {
            border-bottom: none;
        }

        .no-issues {
            color: var(--success);
            font-style: italic;
        }

        /* Variants */
        .variants-container {
            display: grid;
            gap: 20px;
        }

        .winner-prediction {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            padding: 25px;
            border-radius: 12px;
            border: 2px solid var(--warning);
        }

        .winner-card {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-top: 15px;
        }

        .winner-id {
            background: var(--warning);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .winner-score {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .variants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .variant-card {
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--gray-200);
        }

        .variant-card.winner {
            border-color: var(--warning);
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
        }

        .variant-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .variant-angle {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        /* Cross Platform */
        .crossplatform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .platform-card {
            background: #f0f9ff;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #bae6fd;
        }

        .platform-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .platform-score {
            font-size: 1.5rem;
            font-weight: 700;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .platform-copy blockquote {
            font-style: italic;
            padding: 15px;
            background: white;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid var(--primary);
        }

        /* Error Display */
        .error-display {
            background: var(--danger);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .decision-metrics {
                grid-template-columns: 1fr;
            }

            .tab-btn {
                padding: 12px 15px;
                font-size: 0.85rem;
            }

            .scores-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ADLYTICS <span class="badge">v5.0</span></h1>
            <p>AI-Powered Ad Pre-Validation & Optimization</p>
        </header>

        <form id="analyzerForm" class="analyzer-form">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="adCopy">Ad Copy / Headline</label>
                    <textarea id="adCopy" placeholder="Enter your ad copy here..."></textarea>
                </div>

                <div class="form-group full-width">
                    <label for="videoScript">Video Script (Optional)</label>
                    <textarea id="videoScript" placeholder="Enter video script with timecodes [HOOK 0-3s], [BODY 3-15s], [CTA 15-30s]..."></textarea>
                </div>

                <div class="form-group">
                    <label for="platform">Platform *</label>
                    <select id="platform" required>
                        <option value="tiktok">TikTok</option>
                        <option value="facebook">Facebook</option>
                        <option value="instagram">Instagram</option>
                        <option value="youtube">YouTube</option>
                        <option value="google">Google Ads</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="industry">Industry *</label>
                    <select id="industry" required>
                        <option value="saas">SaaS</option>
                        <option value="ecommerce">E-commerce</option>
                        <option value="finance">Finance</option>
                        <option value="health">Health</option>
                        <option value="education">Education</option>
                        <option value="technology">Technology</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="audienceCountry">Target Country *</label>
                    <select id="audienceCountry" required>
                        <option value="nigeria">Nigeria</option>
                        <option value="us">United States</option>
                        <option value="uk">United Kingdom</option>
                        <option value="canada">Canada</option>
                        <option value="ghana">Ghana</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="audienceRegion">Region/State</label>
                    <select id="audienceRegion">
                        <option value="">Select Region</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="audienceAge">Age Range *</label>
                    <select id="audienceAge" required>
                        <option value="18-24">18-24</option>
                        <option value="25-34">25-34</option>
                        <option value="35-44">35-44</option>
                        <option value="45-54">45-54</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="audienceIncome">Income Level</label>
                    <select id="audienceIncome">
                        <option value="">Select Income</option>
                        <option value="low">Low Income</option>
                        <option value="middle">Middle Income</option>
                        <option value="high">High Income</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="audienceOccupation">Occupation</label>
                    <select id="audienceOccupation">
                        <option value="">Select Occupation</option>
                        <option value="professional">Professional</option>
                        <option value="entrepreneur">Entrepreneur</option>
                        <option value="student">Student</option>
                        <option value="freelancer">Freelancer</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="analyzeBtn" class="submit-btn">
                🚀 Analyze Ad Performance
            </button>
        </form>

        <div id="errorDisplay" class="error-display hidden"></div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Analyzing your ad with AI...</p>
            <small>This may take 10-30 seconds</small>
        </div>

        <div id="results" class="results hidden">
            <nav class="tabs-nav">
                <button class="tab-btn active" data-tab="overview">Overview</button>
                <button class="tab-btn" data-tab="decision">🎯 Decision</button>
                <button class="tab-btn" data-tab="budget">💰 Budget</button>
                <button class="tab-btn" data-tab="neuro">🧠 Neuro</button>
                <button class="tab-btn" data-tab="variants">🔄 Variants</button>
                <button class="tab-btn" data-tab="behavior">Behavior</button>
                <button class="tab-btn" data-tab="personas">Personas</button>
                <button class="tab-btn" data-tab="objections">⚠️ Objections</button>
                <button class="tab-btn" data-tab="fatigue">😴 Fatigue</button>
                <button class="tab-btn" data-tab="crossplatform">🌐 Cross-Platform</button>
                <button class="tab-btn" data-tab="video">Video</button>
                <button class="tab-btn" data-tab="improvements">Improvements</button>
            </nav>

            <div id="tab-overview" class="tab-content active">
                <div id="scoresContainer" class="scores-grid"></div>
                <div id="behaviorSummary"></div>
                <div id="criticalWeaknesses"></div>
            </div>

            <div id="tab-decision" class="tab-content">
                <div id="decisionEngine"></div>
            </div>

            <div id="tab-budget" class="tab-content">
                <div id="budgetOptimization"></div>
            </div>

            <div id="tab-neuro" class="tab-content">
                <div id="neuroResponse"></div>
            </div>

            <div id="tab-variants" class="tab-content">
                <div id="adVariants"></div>
            </div>

            <div id="tab-behavior" class="tab-content">
                <div id="phaseBreakdown"></div>
            </div>

            <div id="tab-personas" class="tab-content">
                <div id="personaReactions"></div>
            </div>

            <div id="tab-objections" class="tab-content">
                <div id="objectionDetection"></div>
            </div>

            <div id="tab-fatigue" class="tab-content">
                <div id="creativeFatigue"></div>
            </div>

            <div id="tab-crossplatform" class="tab-content">
                <div id="crossPlatform"></div>
            </div>

            <div id="tab-video" class="tab-content">
                <div id="videoExecution"></div>
            </div>

            <div id="tab-improvements" class="tab-content">
                <div id="improvements"></div>
            </div>
        </div>
    </div>

    <script src="js/analyzer_v5.js"></script>
</body>
</html>
