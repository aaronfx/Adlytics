<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADLYTICS v5.0</title>
    <style>
        :root { --primary: #6366f1; --success: #10b981; --danger: #ef4444; --gray-100: #f3f4f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        .analyzer-form { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; margin-bottom: 8px; }
        .form-group label span.required { color: var(--danger); }
        .form-group input, .form-group select, .form-group textarea { padding: 12px; border: 2px solid var(--gray-100); border-radius: 8px; font-size: 1rem; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-group.full-width { grid-column: 1 / -1; }
        .submit-btn { background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%); color: white; border: none; padding: 16px 32px; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; width: 100%; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading, .error-display, .results { display: none; }
        .loading.active, .error-display.active, .results.active { display: block; }
        .loading { text-align: center; padding: 40px; color: white; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-display { background: var(--danger); color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .results { background: white; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .tabs-nav { display: flex; background: var(--gray-100); border-bottom: 1px solid #e5e7eb; overflow-x: auto; }
        .tab-btn { padding: 16px 20px; border: none; background: none; cursor: pointer; font-weight: 600; white-space: nowrap; }
        .tab-btn.active { background: white; color: var(--primary); border-bottom: 3px solid var(--primary); }
        .tab-content { display: none; padding: 30px; }
        .tab-content.active { display: block; }
        .scores-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .score-card { background: var(--gray-100); border-radius: 12px; padding: 20px; text-align: center; border-left: 4px solid #e5e7eb; }
        .score-card.excellent { border-left-color: var(--success); }
        .score-value { font-size: 2.5rem; font-weight: 700; }
        .decision-card { padding: 30px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .decision-card.success { background: #d1fae5; border: 2px solid var(--success); }
        .decision-card.danger { background: #fee2e2; border: 2px solid var(--danger); }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <header>
            <h1>ADLYTICS <span style="background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 0.85rem;">v5.0</span></h1>
            <p>AI-Powered Ad Pre-Validation</p>
        </header>
        
        <form id="analyzerForm" class="analyzer-form">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Ad Copy / Headline</label>
                    <textarea name="ad_copy" id="adCopy" placeholder="Enter your ad copy..."></textarea>
                </div>
                
                <div class="form-group full-width">
                    <label>Video Script (Optional)</label>
                    <textarea name="video_script" id="videoScript" placeholder="Enter video script with timecodes..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Platform <span class="required">*</span></label>
                    <select name="platform" id="platform" required>
                        <option value="tiktok">TikTok</option>
                        <option value="facebook">Facebook</option>
                        <option value="instagram">Instagram</option>
                        <option value="youtube">YouTube</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Industry <span class="required">*</span></label>
                    <select name="industry" id="industry" required>
                        <option value="saas">SaaS</option>
                        <option value="ecommerce">E-commerce</option>
                        <option value="finance">Finance</option>
                        <option value="health">Health</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Target Country <span class="required">*</span></label>
                    <select name="audience_country" id="audienceCountry" required>
                        <option value="nigeria">Nigeria</option>
                        <option value="ghana">Ghana</option>
                        <option value="us">United States</option>
                        <option value="uk">United Kingdom</option>
                        <option value="canada">Canada</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Region/State</label>
                    <select name="audience_region" id="audienceRegion">
                        <option value="">Select Region</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Age Range <span class="required">*</span></label>
                    <select name="audience_age" id="audienceAge" required>
                        <option value="18-24">18-24</option>
                        <option value="25-34">25-34</option>
                        <option value="35-44">35-44</option>
                        <option value="45-54">45-54</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Income Level</label>
                    <select name="audience_income" id="audienceIncome">
                        <option value="">Select Income</option>
                        <option value="low">Low Income</option>
                        <option value="middle">Middle Income</option>
                        <option value="high">High Income</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Occupation</label>
                    <select name="audience_occupation" id="audienceOccupation">
                        <option value="">Select Occupation</option>
                        <option value="professional">Professional</option>
                        <option value="entrepreneur">Entrepreneur</option>
                        <option value="student">Student</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" id="analyzeBtn" class="submit-btn">🚀 Analyze Ad Performance</button>
        </form>
        
        <div id="errorDisplay" class="error-display"></div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Analyzing your ad...</p>
        </div>
        
        <div id="results" class="results">
            <nav class="tabs-nav">
                <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
                <button class="tab-btn" data-tab="decision" onclick="switchTab('decision')">🎯 Decision</button>
                <button class="tab-btn" data-tab="budget" onclick="switchTab('budget')">💰 Budget</button>
                <button class="tab-btn" data-tab="neuro" onclick="switchTab('neuro')">🧠 Neuro</button>
            </nav>
            
            <div id="tab-overview" class="tab-content active">
                <div id="scoresContainer" class="scores-grid"></div>
                <div id="behaviorSummary"></div>
            </div>
            
            <div id="tab-decision" class="tab-content">
                <div id="decisionEngine"></div>
            </div>
            
            <div id="tab-budget" class="tab-content">
                <div id="budgetOptimization"></div>
            </div>
            
            <div id="tab-neuro" class="tab-content">
                <div id="neuroResponse"></div>
            </div>
        </div>
    </div>

    <script>
        const regionData = {
            nigeria: ["Lagos", "Abuja", "Kano", "Ibadan", "Port Harcourt"],
            ghana: ["Accra", "Kumasi", "Tamale"],
            us: ["California", "Texas", "New York", "Florida"],
            uk: ["London", "Manchester", "Birmingham"],
            canada: ["Ontario", "Quebec", "British Columbia"]
        };

        const countrySelect = document.getElementById('audienceCountry');
        const regionSelect = document.getElementById('audienceRegion');
        const form = document.getElementById('analyzerForm');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const errorDisplay = document.getElementById('errorDisplay');

        function updateRegions() {
            const country = countrySelect.value;
            const regions = regionData[country] || [];
            regionSelect.innerHTML = '<option value="">Select Region</option>';
            regions.forEach(region => {
                const option = document.createElement('option');
                option.value = region.toLowerCase().replace(/\s+/g, '-');
                option.textContent = region;
                regionSelect.appendChild(option);
            });
            console.log(`✅ Loaded ${regions.length} regions for ${country}`);
        }

        countrySelect.addEventListener('change', updateRegions);
        updateRegions();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            loading.classList.add('active');
            results.classList.remove('active');
            errorDisplay.classList.remove('active');
            
            const formData = new FormData(form);
            
            // DEBUG: Log what we're sending
            console.log("📤 Sending FormData:");
            for (let [key, value] of formData.entries()) {
                console.log(`   ${key}: ${value}`);
            }
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error("❌ Server response:", errorText);
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const result = await response.json();
                
                if (result.success) {
                    renderResults(result.data);
                } else {
                    throw new Error(result.error?.message || 'Analysis failed');
                }
            } catch (error) {
                console.error('Error:', error);
                errorDisplay.textContent = error.message;
                errorDisplay.classList.add('active');
            } finally {
                loading.classList.remove('active');
            }
        });

        function renderResults(data) {
            results.classList.add('active');
            const scores = data.scores || {};
            document.getElementById('scoresContainer').innerHTML = `
                <div class="score-card ${scores.overall >= 81 ? 'excellent' : scores.overall >= 61 ? 'good' : 'average'}">
                    <div class="score-value">${scores.overall || 0}</div>
                    <div>Overall</div>
                </div>
                <div class="score-card ${scores.hook_strength >= 81 ? 'excellent' : 'average'}">
                    <div class="score-value">${scores.hook_strength || 0}</div>
                    <div>Hook</div>
                </div>
                <div class="score-card ${scores.clarity >= 81 ? 'excellent' : 'average'}">
                    <div class="score-value">${scores.clarity || 0}</div>
                    <div>Clarity</div>
                </div>
            `;
            
            const decision = data.decision_engine || {};
            document.getElementById('decisionEngine').innerHTML = `
                <div class="decision-card ${decision.should_run ? 'success' : 'danger'}">
                    <h3>${decision.should_run ? '✅ RECOMMENDED' : '❌ DO NOT RUN'}</h3>
                    <p>Confidence: ${decision.confidence || 'N/A'}</p>
                    <p>Expected Profit: $${decision.expected_profit || 0}</p>
                </div>
            `;
            
            const budget = data.budget_optimization || {};
            document.getElementById('budgetOptimization').innerHTML = `
                <div style="background: #f9fafb; padding: 20px; border-radius: 12px;">
                    <h4>Break-Even CPC: $${budget.break_even_cpc || 0}</h4>
                    <h4>Safe Test Budget: $${budget.safe_test_budget || 0}</h4>
                </div>
            `;
            
            const neuro = data.neuro_response || {};
            document.getElementById('neuroResponse').innerHTML = `
                <div style="background: #faf5ff; padding: 20px; border-radius: 12px;">
                    <h4>Primary Driver: ${neuro.primary_driver?.toUpperCase() || 'UNKNOWN'}</h4>
                    <p>Dopamine: ${neuro.dopamine || 0}/100</p>
                    <p>Fear: ${neuro.fear || 0}/100</p>
                    <p>Curiosity: ${neuro.curiosity || 0}/100</p>
                </div>
            `;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.id === `tab-${tabName}`);
            });
        }
    </script>
</body>
</html>
